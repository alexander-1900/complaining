# ----------------------------------------------------------------------
# AFLOU WILAYA - SECURE COMPLAINTS PORTAL
# Nginx High-Performance Production Configuration
# ----------------------------------------------------------------------

server {
    listen 80;
    server_name aflou-complaints.dz; # Replace with official domain

    # Global security settings
    client_max_body_size 5M; # Protect against large file/buffer attacks
    server_tokens off;       # Hide Nginx version for security

    # Root directory for static assets
    root /var/www/aflou-complaints-portal/public;
    index index.html;

    # --- 1. OPTIMIZED STATIC ASSET DELIVERY ---
    # Serves HTML, CSS, JS, and Images directly via Nginx (Kernel level speed)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # --- 2. SECURE API PROXY ---
    # Routes all dynamic citizen requests to the Node.js backend
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Security: Prevent proxy timeouts during slow file scans
        proxy_read_timeout 90;
    }

    # --- 3. HARDENED ADMIN GATEWAY ---
    # Only allow Wilaya IT / Governor Office IP ranges
    # Blocks all other unauthorized IP addresses at the web server level
    location /aflou-gov-gate/ {
        # --- IP WHITELIST (Placeholder for Official Wilaya IP) ---
        allow 193.194.0.0/16; 
        allow 127.0.0.1;      # Local testing
        deny all;             # Mandatory: Block everyone else (403 Forbidden)

        # Proxy to Node.js backend if IP is authorized
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 4. SECURE UPLOAD ACCESS ---
    # Strictly static binary asset delivery.
    # Disables script execution via denial of all executable extensions.
    location /uploads/ {
        alias /var/www/aflou-complaints-portal/storage/attachments/;
        
        # Deny access to potential malicious script files
        location ~* \.(php|pl|py|jsp|sh|js|cgi|htm|html)$ {
            deny all;
        }
        
        # Ensure files are served as downloads, not executed in browser
        add_header Content-Disposition "attachment";
        internal; 
    }

    # Error pages
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
